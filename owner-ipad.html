<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#123d27">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex,nofollow">
  <title>DPRO デイサービス LINE｜スタッフiPad</title>

  <style>
    :root {
      --bg: #eef3f0;
      --surface: #ffffff;
      --surface-soft: #f6faf7;
      --line: #d5e2da;
      --line-strong: #bcd1c3;
      --text: #142219;
      --muted: #617067;
      --brand: #17643a;
      --brand-dark: #0d4827;
      --brand-soft: #e7f6ec;
      --blue: #245bb8;
      --blue-soft: #eaf2ff;
      --orange: #9b4b10;
      --orange-soft: #fff1e5;
      --red: #b42318;
      --red-soft: #fff0ee;
      --purple: #6941a5;
      --purple-soft: #f2edfb;
      --gray-soft: #e8efeb;
      --shadow: 0 12px 32px rgba(20,34,25,.08);
      --shadow-strong: 0 18px 45px rgba(20,34,25,.15);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(23,100,58,.08), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Sans",
        "Yu Gothic UI",
        "Yu Gothic",
        Meiryo,
        sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea { font: inherit; }

    button,
    a,
    input,
    select,
    textarea {
      -webkit-tap-highlight-color: transparent;
    }

    button,
    a { touch-action: manipulation; }

    a {
      color: inherit;
      text-decoration: none;
    }

    .login {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      width: min(520px, 100%);
      padding: 30px;
      border: 1px solid rgba(23,100,58,.16);
      border-radius: 28px;
      background: rgba(255,255,255,.97);
      box-shadow: var(--shadow-strong);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 18px;
      background: linear-gradient(145deg, #21864d, #0d4b29);
      color: #fff;
      font-size: 27px;
      font-weight: 900;
      box-shadow: 0 11px 26px rgba(23,100,58,.23);
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .login-title {
      margin: 28px 0 0;
      font-size: 34px;
      line-height: 1.25;
    }

    .login-copy {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-size: 15px;
      font-weight: 850;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(36,91,184,.11);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 10px 17px;
      border: 1px solid transparent;
      border-radius: 13px;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      transition:
        transform .12s ease,
        box-shadow .12s ease,
        background .12s ease,
        opacity .12s ease;
    }

    .btn:active { transform: scale(.985); }

    .btn:disabled {
      cursor: wait;
      opacity: .62;
      transform: none;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 9px 22px rgba(23,100,58,.2);
    }

    .btn-secondary {
      border-color: var(--line-strong);
      color: var(--text);
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
    }

    .btn-wide { width: 100%; }

    .app {
      display: none;
      min-height: 100vh;
    }

    .app.is-visible { display: block; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 78px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(213,226,218,.92);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(15px);
    }

    .top-brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .top-brand .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      font-size: 28px;
      box-shadow: none;
    }

    .top-brand h1 {
      margin: 0;
      font-size: 22px;
    }

    .top-brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .content {
      width: min(1260px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 90px;
    }

    .control-bar {
      display: grid;
      grid-template-columns: auto auto minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .date-display {
      display: inline-flex;
      align-items: center;
      min-height: 52px;
      padding: 10px 14px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: var(--surface-soft);
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
    }

    .date-picker {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 10px 15px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      overflow: hidden;
    }

    .date-picker input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .summary {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .summary span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .summary strong {
      display: block;
      margin-top: 4px;
      font-size: 30px;
      line-height: 1;
    }

    .summary.is-alert {
      border-color: #efc3bd;
      background: #fff9f8;
    }

    .summary.is-alert strong { color: var(--red); }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin: 20px 2px 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 30px;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .user-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 21px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .user-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #fbfdfc, #f0f8f3);
    }

    .user-name {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .user-number {
      margin-top: 3px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 31px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-neutral { background: var(--gray-soft); color: #526158; }
    .status-ok { background: var(--brand-soft); color: var(--brand); }
    .status-warning { background: var(--orange-soft); color: var(--orange); }
    .status-error { background: var(--red-soft); color: var(--red); }
    .status-blue { background: var(--blue-soft); color: var(--blue); }
    .status-purple { background: var(--purple-soft); color: var(--purple); }

    .transport-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 0 20px 16px;
      background: linear-gradient(135deg, #fbfdfc, #f0f8f3);
    }

    .transport-item {
      padding: 10px;
      border: 1px solid #dbe8df;
      border-radius: 11px;
      background: #fff;
    }

    .transport-item span {
      display: block;
      color: var(--muted);
      font-size: 10px;
    }

    .transport-item strong {
      display: block;
      margin-top: 2px;
      font-size: 14px;
    }

    .alert-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 13px 20px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .alert-chip {
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--orange-soft);
      color: var(--orange);
      font-size: 11px;
      font-weight: 850;
    }

    .alert-chip.note {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .status-panel {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-label {
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .status-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .status-button {
      min-height: 62px;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: #4b5951;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
    }

    .status-button.is-current {
      border-color: #8fc5a0;
      background: var(--brand-soft);
      color: var(--brand-dark);
      box-shadow: inset 0 0 0 1px rgba(23,100,58,.1);
    }

    .status-button:active {
      transform: scale(.98);
    }

    .check-panel {
      padding: 16px 20px;
    }

    .check-buttons {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: stretch;
      gap: 7px;
    }

    .check-button {
      display: grid;
      place-items: center;
      gap: 5px;
      min-height: 82px;
      padding: 10px 6px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      color: #4c5a52;
      cursor: pointer;
      font-size: 11px;
      font-weight: 900;
    }

    .check-button .icon {
      font-size: 24px;
      line-height: 1;
    }

    .check-button.is-complete {
      border-color: #8fc5a0;
      background: var(--brand-soft);
      color: var(--brand-dark);
    }

    .check-button:active { transform: scale(.98); }

    .transport-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      padding: 0 20px 18px;
    }

    .transport-button {
      min-height: 48px;
      padding: 8px 6px;
      border: 1px solid #b9cfe9;
      border-radius: 11px;
      background: var(--blue-soft);
      color: var(--blue);
      cursor: pointer;
      font-size: 11px;
      font-weight: 900;
    }

    .transport-button:active { transform: scale(.98); }

    .empty {
      padding: 28px;
      border: 1px dashed #c3d4c9;
      border-radius: 18px;
      background: rgba(255,255,255,.7);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      text-align: center;
      font-size: 11px;
    }

    @media (max-width: 1180px) {
      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .user-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: stretch;
      }

      .top-actions .btn {
        flex: 1;
      }

      .control-bar {
        grid-template-columns: 1fr 1fr;
      }

      .control-bar .input {
        grid-column: 1 / -1;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status-buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .check-buttons {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .transport-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 430px) {
      .content {
        width: min(100% - 14px, 1180px);
      }

      .control-bar,
      .summary-grid,
      .transport-row {
        grid-template-columns: 1fr;
      }

      .check-buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>

  <script src="./config.js?v=daycare-4-r1"></script>
</head>

<body>
  <section class="login" id="loginScreen">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">＋</div>
        <div>
          <h1>DPRO デイサービス LINE</h1>
          <p>スタッフ用iPad画面</p>
        </div>
      </div>

      <h2 class="login-title">今日の利用者を開く</h2>
      <p class="login-copy">
        管理コードとスタッフ名を入力してください。大きなボタンで利用状況と確認項目を更新できます。
      </p>

      <div class="form-grid">
        <div class="field">
          <label for="adminCodeInput">管理コード</label>
          <input
            class="input"
            id="adminCodeInput"
            type="password"
            inputmode="numeric"
            autocomplete="off"
            placeholder="デモ管理コード 1234"
          >
        </div>

        <div class="field">
          <label for="operatorNameInput">スタッフ名</label>
          <input
            class="input"
            id="operatorNameInput"
            type="text"
            autocomplete="name"
            placeholder="例：山田 スタッフ"
          >
        </div>

        <button class="btn btn-primary btn-wide" id="loginButton" type="button">
          iPad画面を開く
        </button>

        <a class="btn btn-secondary btn-wide" href="./owner.html?v=daycare-8-r2">
          PC管理画面を開く
        </a>
      </div>
    </div>
  </section>

  <div class="app" id="app">
    <header class="topbar">
      <div class="top-brand">
        <div class="brand-mark" aria-hidden="true">＋</div>
        <div>
          <h1>今日の利用者</h1>
          <p id="operatorLabel">スタッフ用iPad画面</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn btn-secondary" id="refreshButton" type="button">
          最新情報に更新
        </button>
        <button class="btn btn-primary" id="logoutButton" type="button">
          終了
        </button>
      </div>
    </header>

    <main class="content">
      <section class="control-bar">
        <span class="date-display" id="dateLabel">日付を確認中</span>

        <label class="date-picker">
          日付を選ぶ
          <input id="dateInput" type="date" aria-label="表示日を選ぶ">
        </label>

        <input
          class="input"
          id="filterInput"
          type="search"
          placeholder="利用者名・利用者番号で絞り込み"
        >

        <select class="select" id="statusFilter">
          <option value="">すべての状態</option>
          <option value="scheduled">利用予定</option>
          <option value="absent">お休み</option>
          <option value="arrived">来所済み</option>
          <option value="in_service">利用中</option>
          <option value="ready_to_go_home">帰宅準備</option>
          <option value="transport_departed">送迎出発</option>
          <option value="completed">帰宅完了</option>
        </select>
      </section>

      <section class="summary-grid">
        <div class="summary">
          <span>利用予定</span>
          <strong id="countTotal">0</strong>
        </div>
        <div class="summary">
          <span>来所済み</span>
          <strong id="countArrived">0</strong>
        </div>
        <div class="summary">
          <span>利用中</span>
          <strong id="countInService">0</strong>
        </div>
        <div class="summary">
          <span>帰宅準備</span>
          <strong id="countReady">0</strong>
        </div>
        <div class="summary">
          <span>帰宅完了</span>
          <strong id="countCompleted">0</strong>
        </div>
        <div class="summary is-alert">
          <span>家族連絡あり</span>
          <strong id="countRequests">0</strong>
        </div>
      </section>

      <div class="section-head">
        <div>
          <h2>利用者一覧</h2>
          <p>状況変更と昼食・入浴・レク等の確認をタッチ操作できます。</p>
        </div>
        <span class="status-pill status-neutral" id="userCountPill">0名</span>
      </div>

      <section class="user-grid" id="userGrid"></section>

      <footer class="footer">
        <div>DPRO デイサービス LINE｜STEP DAYCARE-9</div>
        <div>DAYCARE-9-R1-IPAD-READABILITY-FIX-20260713</div>
      </footer>
    </main>
  </div>

  <script>
    (function startIpadScreen() {
      "use strict";

      const SCREEN_VERSION = "DAYCARE-9-R1-IPAD-READABILITY-FIX-20260713";
      const CONFIG = window.DPRODaycare || window.DPRO_DAYCARE_CONFIG || null;

      const $ = (selector) => document.querySelector(selector);

      const state = {
        day: null,
      };

      const els = {
        loginScreen: $("#loginScreen"),
        app: $("#app"),
        adminCodeInput: $("#adminCodeInput"),
        operatorNameInput: $("#operatorNameInput"),
        loginButton: $("#loginButton"),
        operatorLabel: $("#operatorLabel"),
        refreshButton: $("#refreshButton"),
        logoutButton: $("#logoutButton"),

        dateLabel: $("#dateLabel"),
        dateInput: $("#dateInput"),
        filterInput: $("#filterInput"),
        statusFilter: $("#statusFilter"),

        countTotal: $("#countTotal"),
        countArrived: $("#countArrived"),
        countInService: $("#countInService"),
        countReady: $("#countReady"),
        countCompleted: $("#countCompleted"),
        countRequests: $("#countRequests"),
        userCountPill: $("#userCountPill"),
        userGrid: $("#userGrid"),
      };

      const statusOrder = [
        "scheduled",
        "arrived",
        "in_service",
        "ready_to_go_home",
        "transport_departed",
        "completed",
        "absent",
      ];

      const visibleStatusButtons = [
        "scheduled",
        "arrived",
        "in_service",
        "ready_to_go_home",
        "transport_departed",
        "completed",
        "absent",
      ];

      const checkTypes = [
        "lunch",
        "bath",
        "recreation",
        "family_contact",
        "go_home_preparation",
      ];

      function configRequired() {
        if (!CONFIG) {
          throw new Error(
            "共通設定を読み込めませんでした。ページを再読み込みしてください。"
          );
        }
        return CONFIG;
      }

      function showSuccess(message) {
        CONFIG?.utils?.showSuccess
          ? CONFIG.utils.showSuccess(message)
          : window.alert(message);
      }

      function showError(error) {
        const message = typeof error === "string"
          ? error
          : error?.message || "処理に失敗しました。";

        CONFIG?.utils?.showError
          ? CONFIG.utils.showError(message)
          : window.alert(message);
      }

      async function withButton(button, loadingText, task) {
        if (CONFIG?.utils?.runWithButton) {
          return CONFIG.utils.runWithButton(
            button,
            task,
            { loadingText }
          );
        }

        const original = button?.textContent || "";
        if (button) {
          button.disabled = true;
          button.textContent = loadingText;
        }

        try {
          return await task();
        } finally {
          if (button) {
            button.disabled = false;
            button.textContent = original;
          }
        }
      }

      function today() {
        return CONFIG.utils.todayJst();
      }

      function formatDate(value) {
        return CONFIG.utils.formatDateJa(value);
      }

      function formatTime(value) {
        return CONFIG.utils.formatTimeJa(value, {
          emptyText: "未設定",
        });
      }

      function escapeHtml(value) {
        return CONFIG.utils.escapeHtml(value);
      }

      function statusMode(status) {
        if (["arrived", "in_service", "completed"].includes(status)) {
          return "ok";
        }
        if (status === "absent") return "error";
        if (status === "transport_departed") return "blue";
        if (status === "ready_to_go_home") return "purple";
        if (status === "scheduled") return "neutral";
        return "warning";
      }

      function updateDateLabel() {
        els.dateLabel.textContent = formatDate(
          els.dateInput.value || today()
        );
      }

      async function login() {
        configRequired();

        const adminCode = els.adminCodeInput.value.trim();
        const operatorName =
          els.operatorNameInput.value.trim() || "スタッフ";

        if (!adminCode) {
          throw new Error("管理コードを入力してください。");
        }

        CONFIG.storage.saveAdminCode(adminCode);
        CONFIG.storage.saveOperatorName(operatorName);
        CONFIG.storage.saveDeviceType("ipad");

        await withButton(
          els.loginButton,
          "確認中…",
          async () => {
            await loadDay();

            els.operatorLabel.textContent =
              `${operatorName}・スタッフ用iPad画面`;

            els.loginScreen.style.display = "none";
            els.app.classList.add("is-visible");
            showSuccess("iPad画面を開きました。");
          }
        );
      }

      function logout() {
        CONFIG.storage.clearAdminCode();
        window.location.reload();
      }

      async function loadDay() {
        configRequired();

        const date = els.dateInput.value || today();
        const data = await CONFIG.API.adminGet(
          "adminDay",
          { date }
        );

        state.day = data;
        renderSummary();
        renderUsers();
      }

      function filteredUsers() {
        const entries = state.day?.users || [];
        const keyword = els.filterInput.value
          .trim()
          .toLowerCase();
        const status = els.statusFilter.value;

        return [...entries]
          .filter((entry) => {
            const user = entry.user || {};
            const schedule = entry.schedule || {};

            const matchKeyword = !keyword || [
              user.full_name,
              user.full_name_kana,
              user.user_number,
            ].some((value) =>
              String(value || "")
                .toLowerCase()
                .includes(keyword)
            );

            const matchStatus =
              !status || schedule.status === status;

            return matchKeyword && matchStatus;
          })
          .sort((left, right) => {
            const leftOrder = statusOrder.indexOf(
              left.schedule?.status
            );
            const rightOrder = statusOrder.indexOf(
              right.schedule?.status
            );

            if (leftOrder !== rightOrder) {
              return leftOrder - rightOrder;
            }

            return String(left.user?.full_name || "")
              .localeCompare(
                String(right.user?.full_name || ""),
                "ja"
              );
          });
      }

      function renderSummary() {
        const entries = state.day?.users || [];
        const statusCount = (status) =>
          entries.filter(
            (entry) => entry.schedule?.status === status
          ).length;

        els.countTotal.textContent = entries.filter(
          (entry) => entry.schedule?.status !== "cancelled"
        ).length;
        els.countArrived.textContent = statusCount("arrived");
        els.countInService.textContent = statusCount("in_service");
        els.countReady.textContent = statusCount("ready_to_go_home");
        els.countCompleted.textContent = statusCount("completed");
        els.countRequests.textContent = entries.reduce(
          (sum, entry) =>
            sum + (entry.pending_family_requests?.length || 0),
          0
        );
      }

      function checkRow(entry, checkType) {
        return (entry.daily_checks || []).find(
          (row) => row.check_type === checkType
        ) || null;
      }

      function renderUsers() {
        const entries = filteredUsers();
        els.userCountPill.textContent = `${entries.length}名`;

        if (!entries.length) {
          els.userGrid.innerHTML = `
            <div class="empty">
              該当する利用者はいません。
            </div>
          `;
          return;
        }

        els.userGrid.innerHTML = entries.map((entry) => {
          const user = entry.user || {};
          const schedule = entry.schedule || {};
          const transport = entry.transport || {};
          const requests = entry.pending_family_requests || [];
          const notes = entry.notes || [];

          return `
            <article class="user-card">
              <div class="user-head">
                <div>
                  <h3 class="user-name">${escapeHtml(
                    user.full_name || "名称未設定"
                  )}</h3>
                  <div class="user-number">${escapeHtml(
                    user.user_number || ""
                  )}</div>
                </div>

                <span class="status-pill status-${statusMode(
                  schedule.status
                )}">
                  ${escapeHtml(
                    CONFIG.utils.statusLabel(schedule.status)
                  )}
                </span>
              </div>

              <div class="transport-row">
                <div class="transport-item">
                  <span>送迎方法</span>
                  <strong>${escapeHtml(
                    CONFIG.utils.transportModeLabel(
                      transport.transport_mode ||
                      schedule.transport_mode
                    )
                  )}</strong>
                </div>
                <div class="transport-item">
                  <span>お迎え予定</span>
                  <strong>${escapeHtml(
                    formatTime(transport.pickup_planned_at)
                  )}</strong>
                </div>
                <div class="transport-item">
                  <span>お帰り予定</span>
                  <strong>${escapeHtml(
                    formatTime(transport.dropoff_planned_at)
                  )}</strong>
                </div>
              </div>

              ${
                requests.length || notes.length
                  ? `<div class="alert-row">
                      ${
                        requests.length
                          ? `<span class="alert-chip">
                              家族連絡 ${requests.length}件
                            </span>`
                          : ""
                      }
                      ${
                        notes.length
                          ? `<span class="alert-chip note">
                              申し送り ${notes.length}件
                            </span>`
                          : ""
                      }
                    </div>`
                  : ""
              }

              <div class="status-panel">
                <p class="panel-label">利用状況</p>
                <div class="status-buttons">
                  ${visibleStatusButtons.map((status) => `
                    <button
                      class="status-button ${
                        schedule.status === status
                          ? "is-current"
                          : ""
                      }"
                      type="button"
                      data-schedule-id="${escapeHtml(schedule.id)}"
                      data-status="${escapeHtml(status)}"
                    >
                      ${escapeHtml(
                        CONFIG.ATTENDANCE_STATUSES[status]
                          ?.shortLabel ||
                        CONFIG.utils.statusLabel(status)
                      )}
                    </button>
                  `).join("")}
                </div>
              </div>

              <div class="check-panel">
                <p class="panel-label">個別確認</p>
                <div class="check-buttons">
                  ${checkTypes.map((checkType) => {
                    const row = checkRow(entry, checkType);
                    const complete = Boolean(row?.is_completed);
                    const definition =
                      CONFIG.DAILY_CHECKS[checkType];

                    return `
                      <button
                        class="check-button ${
                          complete ? "is-complete" : ""
                        }"
                        type="button"
                        data-check-schedule-id="${escapeHtml(schedule.id)}"
                        data-check-type="${escapeHtml(checkType)}"
                        data-check-completed="${complete ? "true" : "false"}"
                      >
                        <span class="icon">${escapeHtml(
                          definition?.icon || "✓"
                        )}</span>
                        <span>${escapeHtml(
                          complete
                            ? definition?.completedLabel ||
                              definition?.label
                            : definition?.label ||
                              checkType
                        )}</span>
                      </button>
                    `;
                  }).join("")}
                </div>
              </div>

              ${
                transport.transport_mode === "facility_transport"
                  ? `<div class="transport-actions">
                      <button
                        class="transport-button"
                        type="button"
                        data-transport-schedule-id="${escapeHtml(schedule.id)}"
                        data-direction="pickup"
                        data-transport-status="pickup_departed"
                      >
                        お迎え出発
                      </button>
                      <button
                        class="transport-button"
                        type="button"
                        data-transport-schedule-id="${escapeHtml(schedule.id)}"
                        data-direction="pickup"
                        data-transport-status="pickup_done"
                      >
                        お迎え完了
                      </button>
                      <button
                        class="transport-button"
                        type="button"
                        data-transport-schedule-id="${escapeHtml(schedule.id)}"
                        data-direction="dropoff"
                        data-transport-status="dropoff_departed"
                      >
                        お帰り出発
                      </button>
                      <button
                        class="transport-button"
                        type="button"
                        data-transport-schedule-id="${escapeHtml(schedule.id)}"
                        data-direction="dropoff"
                        data-transport-status="dropoff_done"
                      >
                        お帰り完了
                      </button>
                    </div>`
                  : ""
              }
            </article>
          `;
        }).join("");
      }

      async function updateAttendance(
        scheduleId,
        status,
        button
      ) {
        await withButton(
          button,
          "更新中…",
          async () => {
            const data = await CONFIG.API.adminPost(
              "adminAttendanceStatus",
              {
                schedule_id: scheduleId,
                to_status: status,
                note: "",
              }
            );

            showSuccess(
              data.message || "利用状況を更新しました。"
            );
            await loadDay();
          }
        );
      }

      async function updateDailyCheck(
        scheduleId,
        checkType,
        currentCompleted,
        button
      ) {
        const nextCompleted = !currentCompleted;

        await withButton(
          button,
          nextCompleted ? "確認中…" : "解除中…",
          async () => {
            const data = await CONFIG.API.adminPost(
              "adminDailyCheckStatus",
              {
                schedule_id: scheduleId,
                check_type: checkType,
                is_completed: nextCompleted,
                note: "",
              }
            );

            showSuccess(
              data.message || "確認項目を更新しました。"
            );
            await loadDay();
          }
        );
      }

      async function updateTransport(
        scheduleId,
        direction,
        status,
        button
      ) {
        await withButton(
          button,
          "更新中…",
          async () => {
            const data = await CONFIG.API.adminPost(
              "adminTransportStatus",
              {
                schedule_id: scheduleId,
                direction,
                status,
              }
            );

            showSuccess(
              data.message || "送迎状況を更新しました。"
            );
            await loadDay();
          }
        );
      }

      async function refresh() {
        await withButton(
          els.refreshButton,
          "更新中…",
          async () => {
            await loadDay();
            showSuccess("最新情報に更新しました。");
          }
        );
      }

      function attachEvents() {
        els.loginButton.addEventListener(
          "click",
          () => login().catch((error) => {
            CONFIG?.storage?.clearAdminCode();
            showError(error);
          })
        );

        [els.adminCodeInput, els.operatorNameInput].forEach(
          (input) => {
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter") {
                event.preventDefault();
                login().catch(showError);
              }
            });
          }
        );

        els.logoutButton.addEventListener("click", logout);

        els.refreshButton.addEventListener(
          "click",
          () => refresh().catch(showError)
        );

        els.dateInput.addEventListener("change", () => {
          updateDateLabel();
          loadDay().catch(showError);
        });

        els.filterInput.addEventListener(
          "input",
          renderUsers
        );

        els.statusFilter.addEventListener(
          "change",
          renderUsers
        );

        document.addEventListener("click", (event) => {
          const statusButton =
            event.target.closest("[data-schedule-id][data-status]");

          if (statusButton) {
            updateAttendance(
              statusButton.dataset.scheduleId,
              statusButton.dataset.status,
              statusButton
            ).catch(showError);
            return;
          }

          const checkButton =
            event.target.closest("[data-check-schedule-id]");

          if (checkButton) {
            updateDailyCheck(
              checkButton.dataset.checkScheduleId,
              checkButton.dataset.checkType,
              checkButton.dataset.checkCompleted === "true",
              checkButton
            ).catch(showError);
            return;
          }

          const transportButton =
            event.target.closest("[data-transport-schedule-id]");

          if (transportButton) {
            updateTransport(
              transportButton.dataset.transportScheduleId,
              transportButton.dataset.direction,
              transportButton.dataset.transportStatus,
              transportButton
            ).catch(showError);
          }
        });
      }

      async function initialize() {
        configRequired();

        els.dateInput.value = today();
        updateDateLabel();

        els.adminCodeInput.value =
          CONFIG.storage.getAdminCode();

        els.operatorNameInput.value =
          CONFIG.storage.getOperatorName("デモ スタッフ");

        attachEvents();

        if (CONFIG.storage.getAdminCode()) {
          login().catch(() => {
            els.loginScreen.style.display = "grid";
            els.app.classList.remove("is-visible");
          });
        }
      }

      initialize().catch(showError);
    })();
  </script>
</body>
</html>
